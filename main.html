<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        
        <!-- Initial view with player inputs -->
        <div id="setupSection">
            <div class="input-group">
                <label>Player 1</label>
                <input type="text" id="player-1" placeholder="enter name">
            </div>
            <div class="input-group">
                <label>Player 2</label>
                <input type="text" id="player-2" placeholder="enter name">
            </div>
            <button id="submit">Start Game</button>
        </div>

        <!-- Game board section (initially hidden) -->
        <div id="gameSection" class="hidden">
            <div class="message" id="message"></div>
            <div class="board">
                <div class="cell" id="1"></div>
                <div class="cell" id="2"></div>
                <div class="cell" id="3"></div>
                <div class="cell" id="4"></div>
                <div class="cell" id="5"></div>
                <div class="cell" id="6"></div>
                <div class="cell" id="7"></div>
                <div class="cell" id="8"></div>
                <div class="cell" id="9"></div>
            </div>
            <button id="resetGame">New Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
