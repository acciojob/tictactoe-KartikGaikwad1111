<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Outer div with class container */
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        /* Input section styles */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        #submit {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        #submit:hover {
            background: #5a67d8;
        }

        /* Game board styles */
        .message {
            background: #f0f0f0;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 5px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cell:hover {
            background: #e9ecef;
        }

        .hidden {
            display: none;
        }

        button {
            cursor: pointer;
        }

        #resetGame {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
        }

        #resetGame:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        
        <!-- Initial view with player inputs -->
        <div id="setupSection">
            <div class="input-group">
                <label>Player 1</label>
                <input type="text" id="player-1" placeholder="enter name">
            </div>
            <div class="input-group">
                <label>Player 2</label>
                <input type="text" id="player-2" placeholder="enter name">
            </div>
            <button id="submit">Start Game</button>
        </div>

        <!-- Game board section (initially hidden) -->
        <div id="gameSection" class="hidden">
            <div class="message" id="message"></div>
            <div class="board">
                <div class="cell" id="1"></div>
                <div class="cell" id="2"></div>
                <div class="cell" id="3"></div>
                <div class="cell" id="4"></div>
                <div class="cell" id="5"></div>
                <div class="cell" id="6"></div>
                <div class="cell" id="7"></div>
                <div class="cell" id="8"></div>
                <div class="cell" id="9"></div>
            </div>
            <button id="resetGame">New Game</button>
        </div>
    </div>

    <script>
        // Get DOM elements
        const setupSection = document.getElementById('setupSection');
        const gameSection = document.getElementById('gameSection');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submit');
        const resetBtn = document.getElementById('resetGame');
        const cells = document.querySelectorAll('.cell');
        
        // Game variables
        let player1Name = '';
        let player2Name = '';
        let currentPlayer = 'X';
        let gameActive = true;
        let boardState = ['', '', '', '', '', '', '', '', ''];
        
        // Winning combinations
        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
            [0, 4, 8], [2, 4, 6] // diagonals
        ];
        
        // Function to update the message display
        function updateMessage() {
            if (gameActive) {
                const currentPlayerName = currentPlayer === 'X' ? player1Name : player2Name;
                messageDiv.textContent = `${currentPlayerName}, you're up`;
            }
        }
        
        // Function to check for winner
        function checkWinner() {
            for (let pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    return boardState[a];
                }
            }
            return null;
        }
        
        // Function to check if board is full
        function isBoardFull() {
            return boardState.every(cell => cell !== '');
        }
        
        // Function to handle cell click
        function handleCellClick(index, cellElement) {
            // Check if cell is already filled or game is not active
            if (boardState[index] !== '' || !gameActive) {
                return;
            }
            
            // Mark the cell
            const mark = currentPlayer;
            boardState[index] = mark;
            cellElement.textContent = mark;
            
            // Check for winner
            const winner = checkWinner();
            if (winner) {
                const winnerName = winner === 'X' ? player1Name : player2Name;
                messageDiv.textContent = `${winnerName} congratulations you won!`;
                gameActive = false;
                return;
            }
            
            // Check for draw
            if (isBoardFull()) {
                messageDiv.textContent = "It's a draw!";
                gameActive = false;
                return;
            }
            
            // Switch player
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateMessage();
        }
        
        // Function to reset the game
        function resetGame() {
            // Reset game state
            boardState = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            
            // Clear all cells
            cells.forEach(cell => {
                cell.textContent = '';
            });
            
            // Update message
            updateMessage();
        }
        
        // Function to start the game with player names
        function startGame() {
            // Get player names
            player1Name = document.getElementById('player-1').value.trim();
            player2Name = document.getElementById('player-2').value.trim();
            
            // Validate both names are entered
            if (player1Name === '' || player2Name === '') {
                alert('Please enter both player names');
                return;
            }
            
            // Hide setup section and show game section
            setupSection.classList.add('hidden');
            gameSection.classList.remove('hidden');
            
            // Reset the game
            resetGame();
        }
        
        // Add click event listeners to all cells
        cells.forEach((cell, idx) => {
            cell.addEventListener('click', () => {
                // Only process if game section is visible
                if (!gameSection.classList.contains('hidden')) {
                    handleCellClick(idx, cell);
                }
            });
        });
        
        // Add event listener to submit button
        submitBtn.addEventListener('click', startGame);
        
        // Add event listener to reset button
        resetBtn.addEventListener('click', () => {
            if (!gameSection.classList.contains('hidden')) {
                resetGame();
            }
        });
    </script>
</body>
</html>
